<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list and table</title>
</head>
<body>
    <main>
        <ul>
            <li>apple</li>
            <li>litchi</li>
            <li>mango </li>
        </ul>
        <ol>
            <li>apple</li>
            <li>litchi</li>
            <li>mango </li>
        </ol>
        <table>
        <tr>    
            <th>name</th>
            <th>roll.no</th>
        </tr>
        <tr>    
            <td>anamika</td>
            <td>2060</td>
        </tr>
        </table>
    </main>
</body>
</html>
